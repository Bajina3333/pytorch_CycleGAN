name: CycleGAN

channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:  
  # 基礎環境與核心深度學習框架 (支援 CUDA 12.1 加速)
  - python=3.11
  - pytorch=2.4.0
  - torchvision=0.19.0
  - torchaudio
  - pytorch-cuda=12.1
  
  # 數值運算與資料處理 (繪圖、3D矩陣、報表)
  - numpy=1.24.3
  - pandas          # 讀取 Excel 與輸出 3D 評估 CSV 報表
  - matplotlib      # plot_loss.py 繪製 Loss 收斂圖
  - scipy
  
  # 影像處理與相似度評估
  - scikit-image    # evaluate3D.py 計算 3D SSIM 等指標
  
  # Pip 專屬的高階套件
  - pip
  - pip:
    # CycleGAN 視覺化
    - dominate>=2.8.0  # 產生 HTML 預覽頁面必備
    - Pillow>=10.0.0
    - visdom           # 訓練時的視覺化工具
    - wandb>=0.16.0    # 雲端訓練權重與 Loss 紀錄追蹤
    
    # 醫療影像讀取與轉檔
    - nibabel          # 讀取 .nii.gz 檔案必備
    - pydicom          # 將生成的 .npy 轉回標準 DICOM (.dcm)
